baseURL = 'https://walat.eu/'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

# Enable emoji support in content
enableEmoji = true

# Syntax highlighting
[markup]
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    lineNumbersInTable = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      # Allow HTML in markdown
      unsafe = true

# Development server settings
[server]
  # Enable live reload (default: true)
  # Port will be auto-assigned or use --port flag

# Taxonomies (tags, categories, etc.)
[taxonomies]
  tag = 'tags'
  category = 'categories'
  series = 'series'

# Language configuration
[languages]
  [languages.en]
    languageCode = 'en-US'
    languageName = 'English'
    title = 'Dariusz Walat'
    weight = 1

    [languages.en.params]
      description = 'Senior Software Engineer | Trustworthy Output from Untrustworthy Data'
      author = 'Dariusz Walat'
      email = 'dariusz@walat.eu'
      location = 'Poland (EU Timezone)'
      linkedin = 'https://www.linkedin.com/in/dariusz-walat'

    [[languages.en.menu.main]]
      name = 'Home'
      url = '/'
      weight = 10
    [[languages.en.menu.main]]
      name = 'AI Agents in Practice'
      url = '/series/ai-agents-in-practice/'
      weight = 15
    [[languages.en.menu.main]]
      name = 'CV'
      url = '/cv/'
      weight = 25
    [[languages.en.menu.main]]
      name = 'Contact'
      url = '/contact/'
      weight = 30


# Global params
[params]
  description = 'Senior Software Engineer | Trustworthy Output from Untrustworthy Data'
  author = 'Dariusz Walat'
